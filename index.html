<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Download high-quality 4K wallpapers created exclusively for you. No generic internet posts, only original art.">
    <title>4KWALLPATEER - Exclusive 4K Wallpapers</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brandOrange: '#F97316' }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">

    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-20">
            <a href="#" class="flex-shrink-0">
                <img src="logo.png" alt="4KWALLPATEER Logo" class="h-12 object-contain">
            </a>

            <nav class="hidden md:flex space-x-8">
                <a href="#" class="text-white hover:text-brandOrange transition">Home</a>
                <a href="#blog-section" class="text-white hover:text-brandOrange transition">Blog</a>
            </nav>

            <div class="flex items-center w-full md:w-auto mt-4 md:mt-0">
                <input type="text" id="searchInput" placeholder="Search wallpapers..." 
                       class="w-full md:w-64 bg-gray-700 text-white rounded-l-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-brandOrange">
                <button onclick="searchWallpapers()" class="bg-brandOrange hover:bg-orange-600 text-white px-4 py-2 rounded-r-md transition">
                    Search
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        
        <h2 class="text-3xl font-bold mb-8 text-brandOrange">Latest Original Wallpapers</h2>
        <div id="wallpaper-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <p id="loading-msg" class="text-gray-400">Loading your masterpiece collection...</p>
        </div>

        <div id="blog-section" class="mt-20">
            <h2 class="text-3xl font-bold mb-8 text-brandOrange">Latest from the Blog</h2>
            <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>
    </main>

    <footer class="bg-gray-950 pt-12 pb-8 border-t border-brandOrange/30 mt-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center flex flex-col items-center">
            
            <img src="logo.png" alt="4KWALLPATEER Logo" class="h-10 mb-6 object-contain opacity-80 hover:opacity-100 transition">
            
            <div class="flex space-x-6 mb-6">
                <a href="#" class="text-gray-400 hover:text-brandOrange"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"/></svg></a>
                <a href="#" class="text-gray-400 hover:text-brandOrange"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>
            </div>

            <div class="flex flex-wrap justify-center gap-4 text-sm text-gray-400 mb-6">
                <a href="#about" class="hover:text-brandOrange">About</a>
                <a href="#cookies" class="hover:text-brandOrange">Cookie Policy</a>
                <a href="#disclaimer" class="hover:text-brandOrange">Disclaimer</a>
            </div>
            
            <p class="text-gray-500 text-sm">© 2026 4KWALLPATEER. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // 1. Initialize Supabase (REPLACE WITH YOUR KEYS)
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabaseCreateClient(supabaseUrl, supabaseKey);

        // 2. Fetch and Render Wallpapers
        async function fetchWallpapers(query = '') {
            const grid = document.getElementById('wallpaper-grid');
            
            let dbQuery = supabase.from('wallpapers').select('*').order('created_at', { ascending: false });
            if (query) { dbQuery = dbQuery.contains('tags', [query.toLowerCase()]); }

            const { data, error } = await dbQuery;

            if (error) {
                grid.innerHTML = '<p class="text-red-500">Error loading wallpapers.</p>';
                return;
            }

            grid.innerHTML = ''; // Clear loading message

            data.forEach(wall => {
                const card = document.createElement('div');
                card.className = 'bg-gray-800 rounded-lg overflow-hidden shadow-lg group relative border border-gray-700 hover:border-brandOrange transition';
                
                // Using Supabase image transforms for resolution handling if configured, else fallback to standard download
                card.innerHTML = `
                    <img src="${wall.image_url}" alt="${wall.title}" class="w-full h-64 object-cover">
                    <div class="p-4">
                        <h3 class="text-xl font-bold">${wall.title}</h3>
                        <div class="mt-4 flex flex-wrap gap-2">
                            <button onclick="downloadImage('${wall.image_url}', '1080p')" class="text-xs bg-gray-700 hover:bg-brandOrange text-white px-3 py-1 rounded transition">HD (1080p)</button>
                            <button onclick="downloadImage('${wall.image_url}', '4k')" class="text-xs bg-brandOrange hover:bg-orange-600 text-white px-3 py-1 rounded transition">4K Download</button>
                            <button onclick="saveToFavorites('${wall.id}')" class="text-xs border border-brandOrange text-brandOrange hover:bg-brandOrange hover:text-white px-3 py-1 rounded transition ml-auto">Save</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Search Trigger
        function searchWallpapers() {
            const val = document.getElementById('searchInput').value;
            fetchWallpapers(val);
        }

        // Dummy download function (triggers browser download)
        async function downloadImage(url, res) {
            // In a real production app, you might append ?width=3840 to the Supabase Storage URL
            const a = document.createElement('a');
            a.href = url;
            a.download = `4KWALLPATEER_${res}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function saveToFavorites(id) {
            alert('Wallpaper saved to your local cookies/storage!');
            // Add local storage logic here
        }

        // 3. Fetch Blog Posts from GitHub
        async function fetchGitHubBlogs() {
            const username = 'YOUR_GITHUB_USERNAME';
            const repo = 'YOUR_GITHUB_REPO';
            const folderPath = 'blogs'; // Folder in your repo containing markdown files
            
            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`);
                const files = await res.json();
                
                const blogGrid = document.getElementById('blog-grid');
                blogGrid.innerHTML = '';

                // Just show the first 4 latest blogs
                files.slice(0, 4).forEach(file => {
                    if(file.name.endsWith('.md')) {
                        const blogTitle = file.name.replace('.md', '').replace(/-/g, ' ');
                        blogGrid.innerHTML += `
                            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 hover:border-brandOrange transition">
                                <h3 class="text-xl font-bold capitalize text-white mb-2">${blogTitle}</h3>
                                <a href="${file.html_url}" target="_blank" class="text-brandOrange hover:underline text-sm">Read on GitHub &rarr;</a>
                            </div>
                        `;
                    }
                });
            } catch (err) {
                console.log("No blogs found or GitHub API rate limit reached.");
            }
        }

        // Run on load
        window.onload = () => {
            fetchWallpapers();
            fetchGitHubBlogs();
        };
    </script>
</body>
</html>
