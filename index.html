<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4KWALLPATEER | Premium HD Minimalist Gallery</title>
    <meta name="description" content="Premium YouTube-style UI layout for minimalist 4K wallpaper discoverability. High-speed responsive masonry layout with active modal previews.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        ytWhite: '#FFFFFF', 
                        ytBlack: '#0F0F0F', 
                        ytLightGray: '#F2F2F2',
                        ytHoverGray: '#E5E5E5',
                        ytBorder: '#E5E5E5'
                    }
                }
            }
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .masonry-grid { column-gap: 1.25rem; }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 4; } }
        .masonry-item { break-inside: avoid; margin-bottom: 1.25rem; }
        
        @keyframes falconGlide {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-3px) rotate(4deg); }
        }
        .falcon-animation:hover {
            animation: falconGlide 0.8s ease-in-out infinite;
        }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-ytWhite text-ytBlack antialiased selection:bg-ytBlack selection:text-ytWhite">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // SUPABASE BACKEND ROUTER VARIABLES
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME/main/wallpapers.json';

        let supabase = null;
        if (SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        const CATEGORIES = ["All", "Minimalist", "Dark Mode", "AMOLED", "Anime", "Cyberpunk", "Nature", "Abstract", "Vector"];
        const ASPECT_RATIOS = ["aspect-video", "aspect-[9/16]", "aspect-square", "aspect-[4/3]", "aspect-[3/2]"];

        function App() {
            const [wallpapers, setWallpapers] = useState([]);
            const [currentTab, setCurrentTab] = useState('home'); 
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [loading, setLoading] = useState(false);
            
            // Interactive Modal Preview Tracking States
            const [activePreview, setActivePreview] = useState(null);
            const [userLikes, setUserLikes] = useState([]);

            const fallbackData = [
                { id: 'w1', title: 'Geometric Prism Array Layer', category: 'Abstract', image_url: 'https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=1400', views: 4290, slug: 'prism-array' },
                { id: 'w2', title: 'Cyberpunk Neon Street Matrix', category: 'Cyberpunk', image_url: 'https://images.unsplash.com/photo-1515621061946-eff1c2a352bd?w=1400', views: 8910, slug: 'skyline-stream' },
                { id: 'w3', title: 'Vertical Mountain Foliage Screen', category: 'Nature', image_url: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1400', views: 1120, slug: 'vertical-foliage' },
                { id: 'w4', title: 'Amoled Cosmic Eclipse Dimension', category: 'AMOLED', image_url: 'https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?w=1400', views: 5430, slug: 'eclipse-dimension' },
                { id: 'w5', title: 'Minimalist Horizon Desktop Wave', category: 'Minimalist', image_url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1400', views: 2310, slug: 'horizon-desktop' },
                { id: 'w6', title: 'Anime Skyline Sunset Vista', category: 'Anime', image_url: 'https://images.unsplash.com/photo-1578632767115-351597cf2477?w=1400', views: 7100, slug: 'anime-skyline' }
            ];

            const fetchWallpapers = async (search = '', category = 'All', tab = 'home') => {
                setLoading(true);
                let assets = [];

                try {
                    if (GITHUB_JSON_URL && !GITHUB_JSON_URL.includes('YOUR_GITHUB_USERNAME')) {
                        const response = await fetch(GITHUB_JSON_URL);
                        if (response.ok) assets = await response.json();
                    }
                } catch (err) { console.warn("GitHub content channel initialization bypassed."); }

                if (supabase) {
                    try {
                        const { data } = await supabase.from('wallpapers').select('*');
                        if (data) assets = [...assets, ...data];
                    } catch (e) { console.error(e); }
                }

                if (assets.length === 0) assets = [...fallbackData];

                if (category !== 'All') assets = assets.filter(w => w.category.toLowerCase() === category.toLowerCase());
                if (search) assets = assets.filter(w => w.title.toLowerCase().includes(search.toLowerCase()));

                if (tab === 'trending') {
                    assets.sort((a, b) => (b.views || 0) - (a.views || 0));
                } else if (tab === 'downloads') {
                    const localSaved = JSON.parse(localStorage.getItem('downloads') || '[]');
                    assets = assets.filter(w => localSaved.includes(w.id || w.slug));
                }

                const formatted = assets.map((item, index) => ({
                    ...item,
                    assignedRatio: ASPECT_RATIOS[index % ASPECT_RATIOS.length],
                    views: item.views || Math.floor(Math.random() * 3000) + 200,
                    likesCount: item.likesCount || Math.floor(Math.random() * 500) + 45
                }));

                setWallpapers(formatted);
                setLoading(false);
            };

            useEffect(() => {
                fetchWallpapers(searchQuery, selectedCategory, currentTab);
                setUserLikes(JSON.parse(localStorage.getItem('user_likes') || '[]'));
            }, [selectedCategory, currentTab]);

            const handleSearch = (e) => {
                e.preventDefault();
                fetchWallpapers(searchQuery, selectedCategory, currentTab);
            };

            const toggleLike = (id) => {
                let currentLikes = [...userLikes];
                if (currentLikes.includes(id)) {
                    currentLikes = currentLikes.filter(item => item !== id);
                } else {
                    currentLikes.push(id);
                }
                setUserLikes(currentLikes);
                localStorage.setItem('user_likes', JSON.stringify(currentLikes));
                
                setWallpapers(wallpapers.map(w => {
                    if ((w.id === id || w.slug === id)) {
                        return { ...w, likesCount: currentLikes.includes(id) ? w.likesCount + 1 : w.likesCount - 1 };
                    }
                    return w;
                }));

                if (activePreview && (activePreview.id === id || activePreview.slug === id)) {
                    setActivePreview(prev => ({
                        ...prev,
                        likesCount: currentLikes.includes(id) ? prev.likesCount + 1 : prev.likesCount - 1
                    }));
                }
            };

            const executeDownload = (wallpaper) => {
                let tracks = JSON.parse(localStorage.getItem('downloads') || '[]');
                const identity = wallpaper.id || wallpaper.slug;
                if (!tracks.includes(identity)) {
                    tracks.push(identity);
                    localStorage.setItem('downloads', JSON.stringify(tracks));
                }
                const link = document.createElement('a');
                link.href = wallpaper.image_url;
                link.target = "_blank";
                link.download = `${wallpaper.slug || 'download-4k'}.jpg`;
                link.click();
            };

            // Sidebar recommendation algorithm configuration filtering out the currently active item
            const relatedWallpapers = activePreview 
                ? wallpapers.filter(w => w.category === activePreview.category && (w.id !== activePreview.id || w.slug !== activePreview.slug))
                : [];

            return (
                <div className="flex flex-col min-h-screen bg-ytWhite text-ytBlack">
                    
                    <header className="h-14 bg-ytWhite border-b border-ytBorder flex items-center justify-between px-4 sticky top-0 z-50">
                        <div className="flex items-center space-x-3">
                            <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-ytLightGray rounded-full transition">
                                <svg className="w-5 h-5 text-ytBlack" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                            </button>
                            <div onClick={() => { setCurrentTab('home'); setActivePreview(null); }} className="flex items-center space-x-2 cursor-pointer select-none group">
                                <div className="falcon-animation w-7 h-7 bg-ytBlack rounded-lg flex items-center justify-center transition">
                                    <svg className="w-4 h-4 text-ytWhite transform -rotate-12" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M12 2L9 9H3L8 13L6 20L12 16L18 20L16 13L21 9H15L12 2Z"/>
                                    </svg>
                                </div>
                                <span className="text-lg font-black tracking-tight uppercase">4KWALLPATEER</span>
                            </div>
                        </div>

                        <form onSubmit={handleSearch} className="flex items-center w-full max-w-xl mx-4">
                            <div className="flex w-full bg-ytWhite border border-ytBorder rounded-full overflow-hidden focus-within:border-gray-400 focus-within:shadow-inner transition">
                                <input 
                                    type="text" 
                                    placeholder="Search creative asset posts..." 
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full bg-transparent px-5 py-1.5 text-sm text-ytBlack focus:outline-none placeholder-gray-400"
                                />
                                <button type="submit" className="bg-ytLightGray border-l border-ytBorder px-6 py-1.5 hover:bg-ytHoverGray transition">
                                    <svg className="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                </button>
                            </div>
                        </form>
                        <div className="w-8 h-8 rounded-full bg-ytBlack text-ytWhite flex items-center justify-center font-bold text-xs select-none">A</div>
                    </header>

                    <div className="flex flex-1">
                        <aside className={`${sidebarOpen ? 'w-60 px-2' : 'w-0 -translate-x-full'} transition-all duration-200 bg-ytWhite border-r border-ytBorder flex flex-col pt-3 fixed md:sticky top-14 h-[calc(100vh-56px)] z-40 overflow-hidden`}>
                            <nav className="space-y-1">
                                <button onClick={() => { setCurrentTab('home'); setActivePreview(null); }} className={`w-full flex items-center space-x-5 px-4 py-2.5 rounded-xl text-sm font-semibold transition ${currentTab === 'home' && !activePreview ? 'bg-ytLightGray' : 'hover:bg-ytLightGray/60'}`}>
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                                    <span>Home Feed</span>
                                </button>
                                <button onClick={() => { setCurrentTab('trending'); setActivePreview(null); }} className={`w-full flex items-center space-x-5 px-4 py-2.5 rounded-xl text-sm font-semibold transition ${currentTab === 'trending' ? 'bg-ytLightGray' : 'hover:bg-ytLightGray/60'}`}>
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                                    <span>Trending</span>
                                </button>
                                <button onClick={() => { setCurrentTab('downloads'); setActivePreview(null); }} className={`w-full flex items-center space-x-5 px-4 py-2.5 rounded-xl text-sm font-semibold transition ${currentTab === 'downloads' ? 'bg-ytLightGray' : 'hover:bg-ytLightGray/60'}`}>
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                    <span>Library</span>
                                </button>
                            </nav>
                        </aside>

                        <main className="flex-1 min-w-0 px-4 md:px-8 py-3 bg-ytWhite">
                            
                            {!activePreview ? (
                                <>
                                    <div className="flex items-center space-x-2.5 overflow-x-auto no-scrollbar pb-3 sticky top-14 bg-ytWhite z-30">
                                        {CATEGORIES.map(cat => (
                                            <button 
                                                key={cat}
                                                onClick={() => setSelectedCategory(cat)}
                                                className={`px-4 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider transition ${selectedCategory === cat ? 'bg-ytBlack text-ytWhite' : 'bg-ytLightGray text-ytBlack hover:bg-ytHoverGray'}`}
                                            >
                                                {cat}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="masonry-grid mt-4">
                                        {wallpapers.map(wall => (
                                            <div key={wall.id || wall.slug} onClick={() => setActivePreview(wall)} className="masonry-item bg-ytWhite border border-ytBorder rounded-2xl overflow-hidden group hover:shadow-md hover:border-gray-300 transition cursor-pointer flex flex-col">
                                                <div className={`relative overflow-hidden bg-ytLightGray w-full ${wall.assignedRatio}`}>
                                                    <img src={wall.image_url} alt={wall.title} loading="lazy" className="w-full h-full object-cover transform group-hover:scale-[1.015] transition duration-500"/>
                                                </div>
                                                <div className="p-4 flex items-start space-x-3 bg-ytWhite">
                                                    <div className="w-8 h-8 rounded-full bg-ytLightGray flex-shrink-0 flex items-center justify-center font-mono font-black text-[9px] border border-ytBorder text-ytBlack">4K</div>
                                                    <div className="flex-1 min-w-0">
                                                        <h2 className="text-xs font-bold text-ytBlack truncate uppercase tracking-tight">{wall.title}</h2>
                                                        <p className="text-[10px] text-gray-500 font-semibold mt-0.5 uppercase tracking-wide">{wall.category} Setup</p>
                                                        <p className="text-[10px] text-gray-400 font-mono mt-0.5">{wall.views.toLocaleString()} views</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            ) : (
                                
                                <div className="flex flex-col lg:flex-row gap-6 mt-2 max-w-7xl mx-auto">
                                    
                                    <div className="flex-1 lg:max-w-[70%]">
                                        <div className="bg-ytLightGray rounded-2xl overflow-hidden border border-ytBorder shadow-sm relative">
                                            <img 
                                                src={activePreview.image_url} 
                                                alt={activePreview.title} 
                                                className="w-full h-auto max-h-[75vh] object-contain mx-auto"
                                            />
                                        </div>
                                        
                                        <h1 className="text-lg md:text-xl font-black uppercase tracking-tight mt-4 text-ytBlack">{activePreview.title}</h1>
                                        
                                        <div className="flex flex-wrap items-center justify-between gap-4 border-b border-ytBorder pb-4 mt-2">
                                            <div className="flex items-center space-x-3">
                                                <div className="w-10 h-10 rounded-full bg-ytBlack text-ytWhite flex items-center justify-center font-mono font-black text-xs">HQ</div>
                                                <div>
                                                    <p className="text-xs font-bold uppercase">{activePreview.category} Creator Space</p>
                                                    <p className="text-[11px] text-gray-400 font-mono">{activePreview.views.toLocaleString()} asset distributions</p>
                                                </div>
                                            </div>

                                            <div className="flex items-center space-x-2">
                                                <button 
                                                    onClick={() => toggleLike(activePreview.id || activePreview.slug)}
                                                    className={`flex items-center space-x-2 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider transition ${userLikes.includes(activePreview.id || activePreview.slug) ? 'bg-ytBlack text-ytWhite' : 'bg-ytLightGray text-ytBlack hover:bg-ytHoverGray'}`}
                                                >
                                                    <svg className="w-4 h-4" fill={userLikes.includes(activePreview.id || activePreview.slug) ? "currentColor" : "none"} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 10h4.708c.534 0 .93.517.762 1.017l-1.8 5.4A1 1 0 0116.712 17H11V7l3.725-3.725a1 1 0 011.414 1.414L14 7.828V10z M7 21h4V9H7v12z"/></svg>
                                                    <span>{activePreview.likesCount}</span>
                                                </button>

                                                <button 
                                                    onClick={() => executeDownload(activePreview)}
                                                    className="flex items-center space-x-2 px-5 py-2 bg-ytBlack text-ytWhite hover:bg-gray-800 transition text-xs font-bold uppercase tracking-widest rounded-full"
                                                >
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                                    <span>Download 4K Source</span>
                                                </button>

                                                <button 
                                                    onClick={() => setActivePreview(null)}
                                                    className="p-2 bg-ytLightGray hover:bg-ytHoverGray rounded-full text-ytBlack transition"
                                                    title="Close theater view"
                                                >
                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex-1 lg:max-w-[30%] space-y-3">
                                        <h3 className="text-xs font-black uppercase tracking-widest text-gray-400 border-b border-ytBorder pb-1.5">Up Next: Related Discoveries</h3>
                                        
                                        <div className="space-y-3 max-h-[85vh] overflow-y-auto pr-1 no-scrollbar">
                                            {relatedWallpapers.map(rel => (
                                                <div 
                                                    key={rel.id || rel.slug} 
                                                    onClick={() => { setActivePreview(rel); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                                                    className="flex space-x-3 cursor-pointer group bg-ytWhite hover:bg-ytLightGray/40 p-1.5 rounded-xl border border-transparent hover:border-ytBorder transition duration-200"
                                                >
                                                    <div className="w-32 h-20 bg-ytLightGray rounded-lg overflow-hidden flex-shrink-0 relative">
                                                        <img src={rel.image_url} alt={rel.title} className="w-full h-full object-cover"/>
                                                    </div>
                                                    
                                                    <div className="flex-1 min-w-0 flex flex-col justify-center">
                                                        <h4 className="text-xs font-bold text-ytBlack line-clamp-2 uppercase tracking-tight group-hover:text-gray-700 transition">{rel.title}</h4>
                                                        <p className="text-[10px] text-gray-500 font-medium mt-0.5 uppercase">{rel.category}</p>
                                                        <p className="text-[9px] text-gray-400 font-mono mt-0.5">{rel.views.toLocaleString()} views</p>
                                                    </div>
                                                </div>
                                            ))}

                                            {relatedWallpapers.length === 0 && (
                                                <div className="text-gray-400 text-[11px] uppercase tracking-wide py-6 text-center font-mono border border-dashed border-ytBorder rounded-xl">
                                                    End of system streaming category chain.
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                </div>
                            )}

                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
