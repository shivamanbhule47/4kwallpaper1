<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4KWALLPATEER | Premium HD Minimialist Gallery</title>
    <meta name="description" content="Discover premium high resolution 4K wallpapers. High performance streaming application designed for instant discovery and lightning fast delivery layout.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        ytWhite: '#FFFFFF', 
                        ytBlack: '#0F0F0F', 
                        ytLightGray: '#F2F2F2',
                        ytHoverGray: '#E5E5E5',
                        ytBorder: '#E5E5E5'
                    }
                }
            }
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .masonry-grid { column-gap: 1.25rem; }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 4; } }
        .masonry-item { break-inside: avoid; margin-bottom: 1.25rem; }
        
        /* Custom rotation rules for the Falcon logo interaction */
        @keyframes falconGlide {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-3px) rotate(4deg); }
        }
        .falcon-animation:hover {
            animation: falconGlide 0.8s ease-in-out infinite;
        }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-ytWhite text-ytBlack antialiased selection:bg-ytBlack selection:text-ytWhite">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 1. SYSTEM SERVICE CONFIGURATION CORE
        // Replace with your live API information if utilizing automated write operations
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        // Add your exact GitHub raw URL path link here to fetch copy-pasted images automatically
        const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME/main/wallpapers.json';

        let supabase = null;
        if (SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        const CATEGORIES = ["All", "Minimalist", "Dark Mode", "AMOLED", "Anime", "Cyberpunk", "Nature", "Abstract", "Vector"];
        
        // Static array of distinct aspect-ratio layout style parameters for our random distribution matrix
        const ASPECT_RATIOS = [
            "aspect-video",      // 16:9 Widescreen Desktop Standard
            "aspect-[9/16]",     // 9:16 Vertical Mobile Layout
            "aspect-square",     // 1:1 Clean Square Art
            "aspect-[4/3]",      // 4:3 Vintage Monitor Matrix
            "aspect-[3/2]"       // 3:2 Traditional Professional Mirror
        ];

        function App() {
            const [wallpapers, setWallpapers] = useState([]);
            const [currentTab, setCurrentTab] = useState('home'); // home, trending, downloads, about
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [loading, setLoading] = useState(false);

            // Fisher-Yates array shuffling logic to implement a completely randomized post layout discovery algorithm
            const shuffleArray = (array) => {
                let shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            };

            const fetchWallpapers = async (search = '', category = 'All', tab = 'home') => {
                setLoading(true);
                let combinedAssets = [];

                // Phase A: Fetch and parse copy-pasted image link matrices directly from GitHub
                try {
                    if (GITHUB_JSON_URL && !GITHUB_JSON_URL.includes('YOUR_GITHUB_USERNAME')) {
                        const response = await fetch(GITHUB_JSON_URL);
                        if (response.ok) {
                            const gitData = await response.json();
                            combinedAssets = [...gitData];
                        }
                    }
                } catch (err) {
                    console.warn("GitHub JSON streaming channel offline or waiting for user URL updates. Loading system arrays.");
                }

                // Phase B: Fetch from database cluster layer if active
                if (supabase) {
                    try {
                        let query = supabase.from('wallpapers').select('*');
                        const { data, error } = await query;
                        if (!error && data) {
                            combinedAssets = [...combinedAssets, ...data];
                        }
                    } catch (e) {
                        console.error("Supabase engine synchronization timeout: ", e);
                    }
                }

                // Fallback Engine: Bootstraps original assets automatically if external configurations aren't set yet
                if (combinedAssets.length === 0) {
                    combinedAssets = [
                        { id: 'f1', title: 'Geometric Prism Array', category: 'Abstract', image_url: 'https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=1200', views: 4290, slug: 'prism-array' },
                        { id: 'f2', title: 'Cyberpunk Skyline Stream', category: 'Cyberpunk', image_url: 'https://images.unsplash.com/photo-1515621061946-eff1c2a352bd?w=1200', views: 8910, slug: 'skyline-stream' },
                        { id: 'f3', title: 'Vertical Foliage Screen', category: 'Nature', image_url: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200', views: 1120, slug: 'vertical-foliage' },
                        { id: 'f4', title: 'Amoled Eclipse Dimension', category: 'AMOLED', image_url: 'https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?w=1200', views: 5430, slug: 'eclipse-dimension' },
                        { id: 'f5', title: 'Minimal Horizon Desktop', category: 'Minimalist', image_url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1200', views: 2310, slug: 'horizon-desktop' }
                    ];
                }

                // Phase C: Apply Content Filtering, Randomization, and Structural Layout Ratios
                if (category !== 'All') {
                    combinedAssets = combinedAssets.filter(w => w.category.toLowerCase() === category.toLowerCase());
                }
                if (search) {
                    combinedAssets = combinedAssets.filter(w => w.title.toLowerCase().includes(search.toLowerCase()));
                }

                // Process view configurations based on user selection tabs
                if (tab === 'trending') {
                    combinedAssets.sort((a, b) => (b.views || 0) - (a.views || 0));
                } else if (tab === 'home') {
                    // Trigger the randomized processing algorithm on every navigation reload
                    combinedAssets = shuffleArray(combinedAssets);
                } else if (tab === 'downloads') {
                    const localSaved = JSON.parse(localStorage.getItem('downloads') || '[]');
                    combinedAssets = combinedAssets.filter(w => localSaved.includes(w.id || w.slug));
                }

                // Assign static predictable aspect ratios dynamically based on their index strings to guarantee layout variance
                const formattedData = combinedAssets.map((item, index) => ({
                    ...item,
                    assignedRatio: ASPECT_RATIOS[index % ASPECT_RATIOS.length],
                    views: item.views || Math.floor(Math.random() * 4000) + 150
                }));

                setWallpapers(formattedData);
                setLoading(false);
            };

            useEffect(() => {
                if (['home', 'trending', 'downloads'].includes(currentTab)) {
                    fetchWallpapers(searchQuery, selectedCategory, currentTab);
                }
            }, [selectedCategory, currentTab]);

            const handleSearch = (e) => {
                e.preventDefault();
                fetchWallpapers(searchQuery, selectedCategory, currentTab);
            };

            const executeDownload = (wallpaper) => {
                let tracks = JSON.parse(localStorage.getItem('downloads') || '[]');
                const identityKey = wallpaper.id || wallpaper.slug;
                if (!tracks.includes(identityKey)) {
                    tracks.push(identityKey);
                    localStorage.setItem('downloads', JSON.stringify(tracks));
                }
                
                const link = document.createElement('a');
                link.href = wallpaper.image_url;
                link.target = "_blank";
                link.download = `${wallpaper.slug || 'wallpaper'}.jpg`;
                link.click();
            };

            return (
                <div className="flex flex-col min-h-screen bg-ytWhite text-ytBlack">
                    
                    <header className="h-14 bg-ytWhite border-b border-ytBorder flex items-center justify-between px-4 sticky top-0 z-50">
                        <div className="flex items-center space-x-3">
                            <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-ytLightGray rounded-full transition active:bg-ytHoverGray">
                                <svg className="w-5 h-5 text-ytBlack" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                            </button>
                            
                            <div onClick={() => setCurrentTab('home')} className="flex items-center space-x-2 cursor-pointer select-none group">
                                <div className="falcon-animation w-7 h-7 bg-ytBlack rounded-lg flex items-center justify-center transition duration-300">
                                    <svg className="w-4 h-4 text-ytWhite transform -rotate-12" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M12 2L9 9H3L8 13L6 20L12 16L18 20L16 13L21 9H15L12 2Z"/>
                                    </svg>
                                </div>
                                <span className="text-lg font-black tracking-tighter uppercase font-sans tracking-wide">
                                    4KWALLPATEER
                                </span>
                            </div>
                        </div>

                        <form onSubmit={handleSearch} className="flex items-center w-full max-w-xl mx-4">
                            <div className="flex w-full bg-ytWhite border border-ytBorder rounded-full overflow-hidden focus-within:border-gray-400 focus-within:shadow-inner transition">
                                <input 
                                    type="text" 
                                    placeholder="Search ultra high resolution wallpapers..." 
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full bg-transparent px-5 py-1.5 text-sm text-ytBlack focus:outline-none placeholder-gray-400"
                                />
                                <button type="submit" className="bg-ytLightGray border-l border-ytBorder px-6 py-1.5 hover:bg-ytHoverGray transition active:bg-gray-300">
                                    <svg className="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                </button>
                            </div>
                        </form>

                        <div className="w-8 h-8 rounded-full bg-ytBlack text-ytWhite flex items-center justify-center font-bold text-xs select-none shadow">A</div>
                    </header>

                    <div className="flex flex-1">
                        
                        <aside className={`${sidebarOpen ? 'w-60 px-2' : 'w-0 -translate-x-full'} transition-all duration-200 bg-ytWhite border-r border-ytBorder flex flex-col pt-3 fixed md:sticky top-14 h-[calc(100vh-56px)] z-40 overflow-hidden`}>
                            <nav className="space-y-1">
                                <button onClick={() => setCurrentTab('home')} className={`w-full flex items-center space-x-5 px-4 py-2.5 rounded-xl text-sm font-semibold transition ${currentTab === 'home' ? 'bg-ytLightGray text-ytBlack' : 'text-ytBlack hover:bg-ytLightGray/60'}`}>
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                                    <span>Home Feed</span>
                                </button>
                                <button onClick={() => setCurrentTab('trending')} className={`w-full flex items-center space-x-5 px-4 py-2.5 rounded-xl text-sm font-semibold transition ${currentTab === 'trending' ? 'bg-ytLightGray text-ytBlack' : 'text-ytBlack hover:bg-ytLightGray/60'}`}>
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                                    <span>Trending</span>
                                </button>
                                <button onClick={() => setCurrentTab('downloads')} className={`w-full flex items-center space-x-5 px-4 py-2.5 rounded-xl text-sm font-semibold transition ${currentTab === 'downloads' ? 'bg-ytLightGray text-ytBlack' : 'text-ytBlack hover:bg-ytLightGray/60'}`}>
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                    <span>Library</span>
                                </button>
                            </nav>

                            <div className="mt-6 border-t border-ytBorder pt-4 px-4 space-y-2.5">
                                <button onClick={() => setCurrentTab('about')} className="block text-xs font-semibold text-gray-500 hover:text-ytBlack text-left w-full uppercase tracking-wider">About Framework</button>
                            </div>
                            
                            <div className="mt-auto p-4 text-[10px] text-gray-400 font-mono select-none">
                                © 2026 4KWALLPATEER
                            </div>
                        </aside>

                        <main className="flex-1 min-w-0 px-4 md:px-8 py-3 bg-ytWhite">
                            
                            {['home', 'trending', 'downloads'].includes(currentTab) && (
                                <>
                                    <div className="flex items-center space-x-2.5 overflow-x-auto no-scrollbar pb-3 sticky top-14 bg-ytWhite z-30">
                                        {CATEGORIES.map(cat => (
                                            <button 
                                                key={cat}
                                                onClick={() => setSelectedCategory(cat)}
                                                className={`px-4 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider transition duration-100 ${selectedCategory === cat ? 'bg-ytBlack text-ytWhite' : 'bg-ytLightGray text-ytBlack hover:bg-ytHoverGray'}`}
                                            >
                                                {cat}
                                            </button>
                                        ))}
                                    </div>

                                    {loading ? (
                                        <div className="text-gray-400 text-xs mt-8 font-mono uppercase tracking-widest animate-pulse">Syncing variable visual layouts...</div>
                                    ) : (
                                        <div className="masonry-grid mt-4">
                                            {wallpapers.map(wall => (
                                                <div key={wall.id || wall.slug} className="masonry-item bg-ytWhite border border-ytBorder rounded-2xl overflow-hidden group hover:shadow-md hover:border-gray-300 transition duration-300 flex flex-col">
                                                    
                                                    <div className={`relative overflow-hidden bg-ytLightGray w-full ${wall.assignedRatio}`}>
                                                        <img 
                                                            src={wall.image_url} 
                                                            alt={`${wall.title} - 4K Content Feed`} 
                                                            loading="lazy" 
                                                            className="w-full h-full object-cover transform group-hover:scale-[1.015] transition duration-500"
                                                        />
                                                    </div>

                                                    <div className="p-4 flex items-start space-x-3 bg-ytWhite flex-1">
                                                        <div className="w-8 h-8 rounded-full bg-ytLightGray flex-shrink-0 flex items-center justify-center font-mono font-black text-[9px] border border-ytBorder text-ytBlack">4K</div>
                                                        <div className="flex-1 min-w-0">
                                                            <h2 className="text-xs font-bold text-ytBlack truncate uppercase tracking-tight group-hover:text-gray-700 transition">{wall.title}</h2>
                                                            <p className="text-[10px] text-gray-500 font-semibold mt-0.5 uppercase tracking-wide">{wall.category} Layout</p>
                                                            <p className="text-[10px] text-gray-400 font-mono mt-0.5">{wall.views.toLocaleString()} views</p>
                                                        </div>
                                                    </div>

                                                    <div className="px-4 pb-4 pt-1 bg-ytWhite">
                                                        <button 
                                                            onClick={() => executeDownload(wall)} 
                                                            className="w-full py-2 bg-ytBlack text-ytWhite text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-gray-850 transition flex items-center justify-center space-x-2 border border-transparent active:scale-[0.99]"
                                                        >
                                                            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                                            <span>Get Ultra Resolution</span>
                                                        </button>
                                                    </div>

                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {!loading && wallpapers.length === 0 && (
                                        <div className="text-gray-400 text-xs mt-12 text-center py-24 border-2 border-dashed border-ytBorder rounded-2xl uppercase tracking-widest font-mono">
                                            No wallpapers matching parameters found.
                                        </div>
                                    )}
                                </>
                            )}

                            {currentTab === 'about' && (
                                <div className="max-w-2xl py-6">
                                    <h1 className="text-2xl font-black uppercase tracking-tight mb-4 border-b border-ytBorder pb-2">Platform Specification Layout</h1>
                                    <p className="text-gray-600 text-sm leading-relaxed mb-4">This architecture uses a single-file implementation model built for speed and search engine visibility. It leverages direct, inline JavaScript compilation workflows to bypass cross-origin browser fetch errors commonly found on static hosting servers like GitHub Pages.</p>
                                    <p className="text-gray-600 text-sm leading-relaxed">Images dynamically adjust sizes based on automatic column-break evaluations, maximizing layout space while maintaining high performance across all devices.</p>
                                </div>
                            )}

                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
