<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4KWALLPATEER | Premium Wallpapers & Minimalist Design</title>
    <meta id="meta-desc" name="description" content="Download original high-resolution 4K wallpapers and setups. Handcrafted minimalist art for desktop and mobile layouts.">
    
    <!-- Tailwind CSS for high-speed style rendering -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pureBlack: '#000000',
                        pureWhite: '#ffffff',
                        zincDark: '#121214'
                    }
                }
            }
        }
    </script>
    
    <!-- Supabase Core Connection Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Dynamic SEO Schema Placeholder for Google Ranking -->
    <script id="seo-schema" type="application/ld+json"></script>
</head>
<body class="bg-pureBlack text-pureWhite font-sans antialiased flex min-h-screen selection:bg-pureWhite selection:text-pureBlack">

    <!-- OVERLAY FOR MOBILE SIDEBAR -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/70 z-40 hidden transition-opacity duration-300"></div>

    <!-- SIDEBAR NAVIGATION MENU -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-zincDark border-r border-zinc-800 z-50 transform -translate-x-full transition-transform duration-300 ease-in-out md:translate-x-0 md:static md:h-screen sticky top-0 flex flex-col justify-between">
        <div class="p-6">
            <!-- BOLD TEXT LOGO -->
            <div class="mb-10 pt-2">
                <a href="#" onclick="navigateTo('home')" class="text-2xl font-black tracking-tighter uppercase border-b-4 border-pureWhite pb-1 block w-max">
                    4KWALLPATEER
                </a>
                <span class="text-[10px] uppercase tracking-widest text-zinc-500 block mt-1">Curated Original Art</span>
            </div>

            <!-- NAVIGATION ITEMS -->
            <nav class="space-y-2">
                <a href="#" onclick="navigateTo('home')" class="flex items-center space-x-3 px-4 py-3 rounded text-sm font-semibold bg-pureWhite text-pureBlack transition">
                    <span>Wallpapers & Blogs</span>
                </a>
                <a href="#about" onclick="navigateTo('about')" class="flex items-center space-x-3 px-4 py-3 rounded text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-pureWhite transition">
                    <span>About Collection</span>
                </a>
                <a href="#cookies" onclick="navigateTo('cookies')" class="flex items-center space-x-3 px-4 py-3 rounded text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-pureWhite transition">
                    <span>Cookie Policy</span>
                </a>
                <a href="#disclaimer" onclick="navigateTo('disclaimer')" class="flex items-center space-x-3 px-4 py-3 rounded text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-pureWhite transition">
                    <span>Disclaimer</span>
                </a>
            </nav>
        </div>

        <!-- SIDEBAR FOOTER & SOCIALS -->
        <div class="p-6 border-t border-zinc-800 text-xs text-zinc-500">
            <div class="flex space-x-4 mb-4">
                <a href="#" class="hover:text-pureWhite transition">X / Twitter</a>
                <a href="#" class="hover:text-pureWhite transition">Pinterest</a>
            </div>
            <p>© 2026 4KWALLPATEER.<br>Built for speed.</p>
        </div>
    </aside>

    <!-- MAIN APP WRAPPER -->
    <div class="flex-1 flex flex-col min-w-0">
        
        <!-- TOP HEADER NAVBAR (SEARCH + MOBILE TOGGLE) -->
        <header class="h-20 border-b border-zinc-800 bg-pureBlack/80 backdrop-blur sticky top-0 z-30 px-6 flex items-center justify-between">
            <button onclick="toggleSidebar()" class="md:hidden text-pureWhite p-2 border border-zinc-700 rounded focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>

            <!-- POWERFUL CONTEXTUAL SEARCH -->
            <div class="w-full max-w-xl mx-auto md:mx-0 flex items-center">
                <input type="text" id="searchInput" placeholder="Search keywords (e.g. Dark, Amoled, Minimalist)..." 
                       class="w-full bg-zincDark border border-zinc-800 text-sm text-pureWhite px-4 py-2.5 focus:outline-none focus:border-pureWhite transition rounded-l">
                <button onclick="executeSearch()" class="bg-pureWhite text-pureBlack border border-pureWhite text-sm font-bold px-6 py-2.5 hover:bg-transparent hover:text-pureWhite transition rounded-r">
                    Search
                </button>
            </div>
        </header>

        <!-- VIEW CONTAINER (DYNAMIC PAGES) -->
        <main class="flex-1 p-6 md:p-10 max-w-7xl w-full mx-auto">
            
            <!-- VIEW: HOME (WALLPAPER & BLOG ARCHIVE GRID) -->
            <section id="view-home" class="app-view">
                <div class="mb-8">
                    <h1 class="text-3xl font-black uppercase tracking-tight">The Gallery</h1>
                    <p class="text-zinc-400 text-sm mt-1">Every download features an in-depth creative design breakdown.</p>
                </div>
                <div id="posts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Dynamic rendering via JavaScript -->
                </div>
            </section>

            <!-- VIEW: SINGLE POST VIEW (WALLPAPER DOWNLOAD + DETAILED BLOG ARTICLE) -->
            <section id="view-post" class="app-view hidden max-w-4xl mx-auto">
                <button onclick="navigateTo('home')" class="text-xs uppercase font-bold tracking-widest text-zinc-400 hover:text-pureWhite mb-6 flex items-center">
                    ← Back to Gallery
                </button>
                <article>
                    <h1 id="post-title" class="text-4xl font-black uppercase tracking-tight mb-4"></h1>
                    <div class="border border-zinc-800 bg-zincDark p-2 mb-8 rounded">
                        <img id="post-image" src="" alt="" class="w-full h-auto object-cover rounded max-h-[600px]">
                        <div class="p-4 flex flex-wrap gap-4 items-center justify-between border-t border-zinc-800 mt-2">
                            <span class="text-xs text-zinc-500 uppercase font-mono">Format: Ultra HD 4K</span>
                            <div class="flex gap-2">
                                <a id="btn-download-hd" href="#" target="_blank" class="bg-zinc-800 hover:bg-zinc-700 text-xs font-bold px-4 py-2 uppercase tracking-wider rounded transition">Download 1080p</a>
                                <a id="btn-download-4k" href="#" target="_blank" class="bg-pureWhite text-pureBlack font-bold text-xs px-4 py-2 uppercase tracking-wider rounded transition">Download Original 4K</a>
                            </div>
                        </div>
                    </div>
                    <!-- Core Blog Content to boost Google Crawlers -->
                    <div id="post-body" class="prose prose-invert max-w-none text-zinc-300 space-y-4 leading-relaxed"></div>
                </article>
            </section>

            <!-- VIEW: LEGAL PAGES -->
            <section id="view-static" class="app-view hidden max-w-2xl mx-auto py-6">
                <h1 id="static-title" class="text-3xl font-black uppercase tracking-tight mb-6"></h1>
                <div id="static-content" class="text-zinc-400 text-sm space-y-4 leading-relaxed"></div>
            </section>

        </main>
    </div>

    <!-- CORE LOGIC & SEO COMPILER -->
    <script>
        // 1. CONFIGURATION (Add your details here)
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabaseCreateClient(supabaseUrl, supabaseKey);

        let localPostsCache = [];

        // 2. VANILLA HASH ROUTING CONTROLLER
        function navigateTo(view, identifier = '') {
            document.querySelectorAll('.app-view').forEach(el => el.classList.add('hidden'));
            
            if (view === 'home') {
                document.getElementById('view-home').classList.remove('hidden');
                document.title = "4KWALLPATEER | Premium Minimalist 4K Wallpapers";
            } else if (view === 'post') {
                renderSinglePost(identifier);
                document.getElementById('view-post').classList.remove('hidden');
            } else {
                renderStaticPage(view);
                document.getElementById('view-static').classList.remove('hidden');
            }
            window.scrollTo({ top: 0 });
        }

        // 3. FETCH DATA & GENERATE SEARCH COMPONENT
        async function fetchContent(searchTag = '') {
            const grid = document.getElementById('posts-grid');
            grid.innerHTML = `<p class="text-zinc-500 text-sm uppercase tracking-wider animate-pulse">Scanning server repository...</p>`;

            let query = supabase.from('posts').select('*').order('created_at', { ascending: false });
            
            if(searchTag) {
                query = query.contains('tags', [searchTag.toLowerCase()]);
            }

            const { data, error } = await query;
            if (error || !data) {
                grid.innerHTML = `<p class="text-zinc-600 text-sm">Failed to retrieve datasets. Check API credentials.</p>`;
                return;
            }

            localPostsCache = data;
            grid.innerHTML = '';

            data.forEach(post => {
                grid.innerHTML += `
                    <div class="border border-zinc-800 bg-zincDark/40 rounded overflow-hidden group hover:border-pureWhite transition duration-300">
                        <div class="relative overflow-hidden aspect-video bg-zinc-900">
                            <img src="${post.image_url}" alt="${post.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        </div>
                        <div class="p-5">
                            <h3 class="text-lg font-black uppercase tracking-tight text-pureWhite group-hover:text-zinc-300 transition">${post.title}</h3>
                            <p class="text-zinc-400 text-xs mt-1 line-clamp-2">${post.meta_description}</p>
                            <button onclick="navigateTo('post', '${post.slug}')" class="mt-4 text-xs font-bold uppercase tracking-widest text-pureWhite border-b border-pureWhite pb-0.5 hover:text-zinc-400 hover:border-zinc-400 transition">
                                Read Post & Get Image →
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function executeSearch() {
            const queryVal = document.getElementById('searchInput').value;
            fetchContent(queryVal);
        }

        // 4. INJECT RICH CONTENT AND RUN SEO MARKUP
        function renderSinglePost(slug) {
            const post = localPostsCache.find(p => p.slug === slug);
            if (!post) return;

            document.getElementById('post-title').innerText = post.title;
            const imgEl = document.getElementById('post-image');
            imgEl.src = post.image_url;
            imgEl.alt = `${post.title} 4K high resolution background download context`;
            
            // Supabase high performance resizing features integration
            document.getElementById('btn-download-hd').href = `${post.image_url}?width=1920&resize=contain`;
            document.getElementById('btn-download-4k').href = post.image_url;
            
            document.getElementById('post-body').innerHTML = post.blog_content || `<p>No added article context provided for this image resource.</p>`;

            // UPDATE DOCUMENT TARGET METADATA (Crucial for search engines ranking)
            document.title = `${post.title} | 4K Wallpaper & Article`;
            document.getElementById('meta-desc').setAttribute('content', post.meta_description);

            // RUN DYNAMIC GOOGLE SCHEMA MARKUP Injection
            const schema = {
                "@context": "https://schema.org",
                "@type": "BlogPosting",
                "headline": post.title,
                "description": post.meta_description,
                "image": post.image_url,
                "datePublished": post.created_at,
                "author": { "@type": "Organization", "name": "4KWALLPATEER" }
            };
            document.getElementById('seo-schema').textContent = JSON.stringify(schema);
        }

        // 5. STATIC LEGAL PAGE GENERATOR (Keep core architecture completely clean)
        function renderStaticPage(type) {
            const titleEl = document.getElementById('static-title');
            const contentEl = document.getElementById('static-content');

            const structures = {
                about: {
                    title: "About the Project",
                    body: "<p>Welcome to 4KWALLPATEER. This archive serves as a highly tailored production setup for raw desktop digital creations. Unlike generic parsing visual hubs, every asset here remains distinctly published and cataloged individually by the creator, paired alongside context design articles to document visual development asset composition.</p>"
                },
                cookies: {
                    title: "Cookie Framework",
                    body: "<p>We employ essential client system storage items to retain structural session choices, search telemetry preferences, and platform speed enhancements. No aggressive advertising profile modules are tracked.</p>"
                },
                disclaimer: {
                    title: "Disclaimer Policy",
                    body: "<p>All media distribution components displayed here are generated for user-end modifications and monitor system customization. Re-distributing raw assets directly through secondary commercial systems without configuration authorization remains structurally limited.</p>"
                }
            };

            if(structures[type]) {
                titleEl.innerText = structures[type].title;
                contentEl.innerHTML = structures[type].body;
                document.title = `${structures[type].title} | 4KWALLPATEER`;
            }
        }

        // UI INTERACTION HANDLERS
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sb.classList.contains('-translate-x-full')) {
                sb.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sb.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        window.addEventListener('DOMContentLoaded', () => { fetchContent(); });
    </script>
</body>
</html>
