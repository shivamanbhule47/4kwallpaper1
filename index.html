<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4KWALLPATEER | Premium HD Mosaic Streaming Cluster & Community Network</title>
    <meta name="description" content="Production-grade minimalist 4K visual platform featuring fluid grid structures, advanced query indexing, and integrated cloud database storage synchronization.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        ytWhite: '#FFFFFF', 
                        ytBlack: '#111111', 
                        ytLightGray: '#F5F5F5',
                        ytHoverGray: '#E8E8E8',
                        ytBorder: '#EFEFEF',
                        pintRed: '#E60023'
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Advanced Mosaic Multi-Column Structural Flow Rules */
        .masonry-grid { column-gap: 1rem; width: 100%; }
        @media (min-width: 480px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }
        @media (min-width: 1440px) { .masonry-grid { column-count: 5; } }
        
        .masonry-item { break-inside: avoid; margin-bottom: 1rem; display: block; }
        
        @keyframes dynamicGlide {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-4px) rotate(3deg); }
        }
        .brand-animation:hover { animation: dynamicGlide 0.6s ease-in-out infinite; }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-ytWhite text-ytBlack antialiased selection:bg-ytBlack selection:text-ytWhite font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // =========================================================================
        // PRODUCTION DATABASE CONNECTION INFRASTRUCTURE & MOCK BALANCING PROLOGUE
        // =========================================================================
        const SUPABASE_URL = 'YOUR_SUPABASE_URL'; 
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; 
        const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME/main/wallpapers.json';

        let supabase = null;
        if (SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_URL.trim() !== '') {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // GLOBAL HARDCODED TAXONOMY ARRAYS
        const CATEGORIES = ["All", "Minimalist", "Dark Mode", "AMOLED", "Anime", "Cyberpunk", "Nature", "Abstract", "Vector"];
        const TRENDING_CATEGORIES = ["Cyberpunk", "AMOLED", "Minimalist", "Anime", "Nature"];
        const ASPECT_RATIOS = ["aspect-[3/4]", "aspect-[9/16]", "aspect-[4/5]", "aspect-square", "aspect-[2/3]", "aspect-[10/16]"];

        function App() {
            // General Architectural Interface States
            const [baseWallpapers, setBaseWallpapers] = useState([]);
            const [communityWallpapers, setCommunityWallpapers] = useState([]);
            const [currentTab, setCurrentTab] = useState('home'); // home, trending, library, upload, about, cookies, privacy, terms, disclaimer
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [searchInputValue, setSearchInputValue] = useState('');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [loading, setLoading] = useState(false);
            const [activePreview, setActivePreview] = useState(null);

            // Menu Accordion Visibility States
            const [exploreMenuOpen, setExploreMenuOpen] = useState(false);
            const [profileDropdownOpen, setProfileDropdownOpen] = useState(false);
            const [authModalOpen, setAuthModalOpen] = useState(false);

            // User Identity & Local Activity Logging Pools
            const [user, setUser] = useState(null);
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authMode, setAuthMode] = useState('login'); // login | register
            const [userLikes, setUserLikes] = useState([]);
            const [userDownloads, setUserDownloads] = useState([]);

            // Pinterest-style Asset Submissions Content Controller Workspace State Properties
            const [newTitle, setNewTitle] = useState('');
            const [newUrl, setNewUrl] = useState('');
            const [newCategory, setNewCategory] = useState('Minimalist');
            const [formErrors, setFormErrors] = useState({});

            // Element UI Overlay Outside Click Reference Hooks
            const exploreRef = useRef(null);
            const profileRef = useRef(null);

            const baselineFallbackData = [
                { id: 'b1', title: 'Geometric Minimal Line Gradient', category: 'Minimalist', image_url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1400', views: 8940, slug: 'minimal-gradient' },
                { id: 'b2', title: 'Cyberpunk Tokyo Hub Terminal', category: 'Cyberpunk', image_url: 'https://images.unsplash.com/photo-1515621061946-eff1c2a352bd?w=1400', views: 14200, slug: 'tokyo-hub' },
                { id: 'b3', title: 'OLED Monolith Abstract Core', category: 'AMOLED', image_url: 'https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?w=1400', views: 9310, slug: 'monolith-core' },
                { id: 'b4', title: 'Japanese Alpine Ridge Screen', category: 'Nature', image_url: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1400', views: 4120, slug: 'alpine-ridge' },
                { id: 'b5', title: 'Vector Sunset Horizon Array', category: 'Vector', image_url: 'https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=1400', views: 5600, slug: 'sunset-vector' },
                { id: 'b6', title: 'Retro Synthwave Grid Sequence', category: 'Cyberpunk', image_url: 'https://images.unsplash.com/photo-1578632767115-351597cf2477?w=1400', views: 11050, slug: 'synthwave-sequence' },
                { id: 'b7', title: 'Nordic Forest Mist Canvas', category: 'Nature', image_url: 'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=1400', views: 3200, slug: 'nordic-forest' },
                { id: 'b8', title: 'Dark Matter Structural Cluster', category: 'Dark Mode', image_url: 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=1400', views: 12450, slug: 'dark-cluster' }
            ];

            // -------------------------------------------------------------------------
            // INITIAL SESSION COUPLING & ACCESSIBILITY PIPELINE SYNCHRONIZER
            // -------------------------------------------------------------------------
            useEffect(() => {
                setUserLikes(JSON.parse(localStorage.getItem('wall_likes') || '[]'));
                setUserDownloads(JSON.parse(localStorage.getItem('wall_downloads') || '[]'));
                setCommunityWallpapers(JSON.parse(localStorage.getItem('wall_community_cache') || '[]'));

                if (supabase) {
                    // Production Authentication Sync Logic
                    supabase.auth.getSession().then(({ data: { session } }) => {
                        if (session) setUser(session.user);
                    });
                    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                        setUser(session ? session.user : null);
                    });
                    return () => subscription.unsubscribe();
                } else {
                    // Failover Local Authentication Simulation Channels
                    const cachedSimUser = localStorage.getItem('sim_session_email');
                    if (cachedSimUser) setUser({ email: cachedSimUser, id: 'simulated-uuid-hash-node' });
                }

                // Global Event Handlers for UI Popup Element Safeguards
                const handleOutsideClicks = (e) => {
                    if (exploreRef.current && !exploreRef.current.contains(e.target)) setExploreMenuOpen(false);
                    if (profileRef.current && !profileRef.current.contains(e.target)) setProfileDropdownOpen(false);
                };
                document.addEventListener('mousedown', handleOutsideClicks);
                return () => document.removeEventListener('mousedown', handleOutsideClicks);
            }, []);

            // REAL-TIME SYNCHRONIZED RE-FETCH ROUTINE
            useEffect(() => {
                const compilePlatformFeeds = async () => {
                    setLoading(true);
                    let compiledAssets = [];

                    // 1. Attempt REST Sync Extraction over Content Delivery Endpoint
                    try {
                        if (GITHUB_JSON_URL && !GITHUB_JSON_URL.includes('YOUR_GITHUB_USERNAME')) {
                            const res = await fetch(GITHUB_JSON_URL);
                            if (res.ok) compiledAssets = await res.json();
                        }
                    } catch (err) { console.warn("GitHub content delivery framework inactive."); }

                    // 2. Main Live Cloud Execution Query Sequence
                    if (supabase) {
                        try {
                            const { data, error } = await supabase
                                .from('wallpapers')
                                .select('*')
                                .order('created_at', { ascending: false });
                            if (error) throw error;
                            if (data && data.length > 0) compiledAssets = [...data, ...compiledAssets];
                        } catch (dbErr) { console.error("Supabase live execution routing bypassed:", dbErr.message); }
                    }

                    // 3. Evaluate Result Array Capacity Or Direct to Fallback Pools
                    if (compiledAssets.length === 0) {
                        compiledAssets = [...baselineFallbackData];
                    }

                    setBaseWallpapers(compiledAssets);
                    setLoading(false);
                };

                compilePlatformFeeds();
            }, []);

            // -------------------------------------------------------------------------
            // AUTHENTICATION INTERACTION MATRIX HANDLERS
            // -------------------------------------------------------------------------
            const handleIdentityVerification = async (e) => {
                e.preventDefault();
                if (!authEmail.trim() || !authPassword.trim()) return;

                if (supabase) {
                    try {
                        if (authMode === 'register') {
                            const { data, error } = await supabase.auth.signUp({ email: authEmail, password: authPassword });
                            if (error) throw error;
                            alert('Registration system confirmation sent or verified!');
                        } else {
                            const { data, error } = await supabase.auth.signInWithPassword({ email: authEmail, password: authPassword });
                            if (error) throw error;
                        }
                        setAuthModalOpen(false);
                    } catch (err) { alert(`Cloud identity verification failure: ${err.message}`); }
                } else {
                    // Local Validation Fallback Simulation Actions
                    localStorage.setItem('sim_session_email', authEmail);
                    setUser({ email: authEmail, id: 'simulated-uuid-hash-node' });
                    setAuthModalOpen(false);
                }
            };

            const terminateSession = async () => {
                if (supabase) await supabase.auth.signOut();
                localStorage.removeItem('sim_session_email');
                setUser(null);
                setProfileDropdownOpen(false);
                setCurrentTab('home');
                setActivePreview(null);
            };

            // -------------------------------------------------------------------------
            // DATA PROCESSING STRUCTURAL COMPILATION SELECTION ENGINE (MEMOIZED MAPS)
            // -------------------------------------------------------------------------
            const globalAggregatedDataPool = useMemo(() => {
                const combinedCollection = [...communityWallpapers, ...baseWallpapers];
                
                // Deduplicate items securely by unique key parameters (id or slug)
                const processingMap = new Map();
                combinedCollection.forEach(item => {
                    const uniqueIdentifier = item.id || item.slug;
                    if (!processingMap.has(uniqueIdentifier)) {
                        processingMap.set(uniqueIdentifier, item);
                    }
                });
                
                return Array.from(processingMap.values()).map((asset, index) => ({
                    ...asset,
                    assignedRatio: asset.assignedRatio || ASPECT_RATIOS[index % ASPECT_RATIOS.length],
                    views: asset.views || (2400 + (index * 142)),
                    likesCount: asset.likesCount || (34 + (index * 9))
                }));
            }, [baseWallpapers, communityWallpapers]);

            // DYNAMIC SEARCH SEARCH & EXPLORATION CHIP INDEX FILTER ROUTER
            const filteredVisualFeedCollection = useMemo(() => {
                let trackingPool = [...globalAggregatedDataPool];

                if (selectedCategory !== 'All') {
                    trackingPool = trackingPool.filter(w => w.category.toLowerCase() === selectedCategory.toLowerCase());
                }

                if (searchQuery) {
                    const normalizedQuery = searchQuery.toLowerCase().trim();
                    trackingPool = trackingPool.filter(w => 
                        w.title.toLowerCase().includes(normalizedQuery) ||
                        w.category.toLowerCase().includes(normalizedQuery) ||
                        (w.slug && w.slug.toLowerCase().includes(normalizedQuery)) ||
                        (w.creator && w.creator.toLowerCase().includes(normalizedQuery))
                    );
                }

                if (currentTab === 'trending') {
                    trackingPool.sort((alpha, beta) => beta.views - alpha.views);
                } else if (currentTab === 'library') {
                    trackingPool = trackingPool.filter(w => 
                        userLikes.includes(w.id || w.slug) || 
                        userDownloads.includes(w.id || w.slug)
                    );
                }

                return trackingPool;
            }, [globalAggregatedDataPool, selectedCategory, searchQuery, currentTab, userLikes, userDownloads]);

            // -------------------------------------------------------------------------
            // INTERACTIVE ASSET MANAGEMENT ENGAGEMENT ACTIONS
            // -------------------------------------------------------------------------
            const triggerSearchQueryExecution = () => {
                setSearchQuery(searchInputValue);
                setActivePreview(null);
                if (currentTab !== 'trending' && currentTab !== 'library') {
                    setCurrentTab('home');
                }
            };

            const toggleAssetPreferenceLike = async (identity) => {
                let freshLikes = [...userLikes];
                if (freshLikes.includes(identity)) {
                    freshLikes = freshLikes.filter(id => id !== identity);
                } else {
                    freshLikes.push(identity);
                }
                setUserLikes(freshLikes);
                localStorage.setItem('wall_likes', JSON.stringify(freshLikes));

                // Cloud-side Incremental Synchronization Logic (Optional Analytics Trackers)
                if (supabase) {
                    try {
                        const referenceItem = globalAggregatedDataPool.find(w => (w.id === identity || w.slug === identity));
                        if (referenceItem && referenceItem.id && typeof referenceItem.id === 'number') {
                            const changeDelta = freshLikes.includes(identity) ? 1 : -1;
                            await supabase.from('wallpapers')
                                .update({ likesCount: Math.max(0, (referenceItem.likesCount || 0) + changeDelta) })
                                .eq('id', referenceItem.id);
                        }
                    } catch (err) { console.warn("Supabase analytics metrics delta bypass."); }
                }

                if (activePreview && (activePreview.id === identity || activePreview.slug === identity)) {
                    setActivePreview(prev => ({
                        ...prev,
                        likesCount: freshLikes.includes(identity) ? prev.likesCount + 1 : Math.max(0, prev.likesCount - 1)
                    }));
                }
            };

            const processDownloadAction = async (assetObject) => {
                const uniqueKey = assetObject.id || assetObject.slug;
                let activeDownloads = [...userDownloads];
                if (!activeDownloads.includes(uniqueKey)) {
                    activeDownloads.push(uniqueKey);
                    setUserDownloads(activeDownloads);
                    localStorage.setItem('wall_downloads', JSON.stringify(activeDownloads));
                }

                // Incremental Cloud Analytics View Target Query Execution
                if (supabase && typeof assetObject.id === 'number') {
                    try {
                        await supabase.from('wallpapers')
                            .update({ views: (assetObject.views || 0) + 1 })
                            .eq('id', assetObject.id);
                    } catch (e) {}
                }

                const extractionNode = document.createElement('a');
                extractionNode.href = assetObject.image_url;
                extractionNode.target = "_blank";
                extractionNode.download = `${assetObject.slug || '4kwallpateer-asset'}.jpg`;
                document.body.appendChild(extractionNode);
                extractionNode.click();
                document.body.removeChild(extractionNode);
            };

            // PINTEREST HIGH-FIDELITY USER UPLOAD SUBMISSION CONTROLLER
            const processUserUpload = async (e) => {
                e.preventDefault();
                if (!user) {
                    setAuthModalOpen(true);
                    return;
                }

                // Strict Client-Side Input Form Sanitization Rules
                const structuralErrors = {};
                if (!newTitle.trim()) structuralErrors.title = "A creative wallpaper title mapping reference is required.";
                if (!newUrl.trim() || !newUrl.startsWith('http')) structuralErrors.url = "Please enter an absolute graphic asset address link URL (http/https).";
                
                if (Object.keys(structuralErrors).length > 0) {
                    setFormErrors(structuralErrors);
                    return;
                }

                setFormErrors({});
                const dynamicUnixStamp = Date.now();
                const alphanumericSlug = 'shared-' + dynamicUnixStamp + '-' + newTitle.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

                const compositePayloadNode = {
                    title: newTitle.trim(),
                    category: newCategory,
                    image_url: newUrl.trim(),
                    slug: alphanumericSlug,
                    views: 45,
                    likesCount: 2,
                    creator: user.email,
                    assignedRatio: ASPECT_RATIOS[Math.floor(Math.random() * ASPECT_RATIOS.length)]
                };

                // 1. Core Cloud Query Insertion Target Matrix Sequence
                if (supabase) {
                    try {
                        const { error } = await supabase.from('wallpapers').insert([compositePayloadNode]);
                        if (error) throw error;
                    } catch (insertErr) {
                        console.warn("Direct cloud ingestion failed, switching to local cache pipelines:", insertErr.message);
                    }
                }

                // 2. Failover Runtime Synchronization Cache Buffer State Assignment
                const updatedCommunityCache = [compositePayloadNode, ...communityWallpapers];
                setCommunityWallpapers(updatedCommunityCache);
                localStorage.setItem('wall_community_cache', JSON.stringify(updatedCommunityCache));

                // Clear input structures and flash view state routing back onto index stream grid
                setNewTitle('');
                setNewUrl('');
                setSelectedCategory('All');
                setCurrentTab('home');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                alert("Success! Your visualization element has been compiled into the community gallery cluster stream.");
            };

            // Related Content Recommendation Filter Criteria Matching Algorithm Logic
            const relatedContentStreamCollection = activePreview 
                ? globalAggregatedDataPool.filter(item => item.category === activePreview.category && (item.id !== activePreview.id || item.slug !== activePreview.slug))
                : [];

            return (
                <div className="flex flex-col min-h-screen bg-ytWhite text-ytBlack relative antialiased">
                    
                    {/* =========================================================================
                        FIXED NAVIGATION BAR STRUCTURAL HEADER
                        ========================================================================= */}
                    <header className="h-16 bg-ytWhite border-b border-ytBorder flex items-center justify-between px-4 md:px-6 sticky top-0 z-50 select-none">
                        
                        {/* BRAND LOGO DESIGN LABELS CONTAINER */}
                        <div className="flex items-center space-x-4">
                            <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-ytLightGray rounded-full transition text-ytBlack" aria-label="Toggle Side Deck Panel">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
                            </button>
                            
                            <div onClick={() => { setCurrentTab('home'); setActivePreview(null); setSelectedCategory('All'); setSearchQuery(''); setSearchInputValue(''); }} className="flex items-center space-x-2.5 cursor-pointer group">
                                <div className="brand-animation w-8 h-8 bg-ytBlack rounded-xl flex items-center justify-center shadow-sm transition">
                                    <svg className="w-4 h-4 text-ytWhite transform -rotate-12" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M12 2L9 9H3L8 13L6 20L12 16L18 20L16 13L21 9H15L12 2Z"/>
                                    </svg>
                                </div>
                                <span className="text-base font-black tracking-tighter uppercase font-sans hidden sm:inline-block">4KWALLPATEER</span>
                            </div>
                        </div>

                        {/* INTERACTION HUB DIRECTORY INTERACTION CAPABILITY OVERLAYS */}
                        <div className="flex items-center space-x-1 md:space-x-4 mx-2">
                            
                            {/* DYNAMIC EXPLORE CATEGORIES OVERLAY CONTROL ANCHOR */}
                            <div className="relative" ref={exploreRef}>
                                <button 
                                    onClick={() => setExploreMenuOpen(!exploreMenuOpen)}
                                    className={`flex items-center space-x-1 px-3 py-2 rounded-full text-xs font-bold uppercase tracking-wider transition ${exploreMenuOpen ? 'bg-ytBlack text-ytWhite' : 'text-gray-600 hover:bg-ytLightGray'}`}
                                >
                                    <span>Explore</span>
                                    <svg className={`w-3.5 h-3.5 transform transition-transform duration-200 ${exploreMenuOpen ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/></svg>
                                </button>

                                {/* EXPLORE TRENDING CATEGORIES FLOATING SELECTION CHIPS ACCORDION */}
                                {exploreMenuOpen && (
                                    <div className="absolute left-0 mt-2 w-64 bg-ytWhite border border-ytBorder rounded-2xl shadow-xl py-3 z-50 font-sans">
                                        <div className="px-4 pb-2 mb-1 border-b border-ytBorder">
                                            <span className="text-[10px] text-gray-400 font-extrabold uppercase tracking-widest">Trending Categories</span>
                                        </div>
                                        <div className="grid grid-cols-1 px-2 gap-0.5">
                                            {TRENDING_CATEGORIES.map(categoryItem => (
                                                <button
                                                    key={categoryItem}
                                                    onClick={() => {
                                                        setSelectedCategory(categoryItem);
                                                        setExploreMenuOpen(false);
                                                        setActivePreview(null);
                                                        setCurrentTab('home');
                                                    }}
                                                    className="w-full text-left px-3 py-2 text-xs font-bold rounded-lg text-ytBlack hover:bg-ytLightGray flex items-center justify-between group transition"
                                                >
                                                    <span>{categoryItem} Layouts</span>
                                                    <span className="w-1.5 h-1.5 rounded-full bg-pintRed opacity-0 group-hover:opacity-100 transition-opacity"></span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* HIGH-PERFORMANCE CENTRAL SEARCH INPUT MATRIX SECTION */}
                        <div className="flex-1 max-w-xl mx-2 md:mx-6">
                            <div className="flex w-full bg-ytWhite border border-ytBorder rounded-full overflow-hidden focus-within:border-gray-400 focus-within:shadow-[inset_0_1px_2px_rgba(0,0,0,0.05)] transition-all">
                                <input 
                                    type="text" 
                                    placeholder="Search by creative asset title, category styles, creators..." 
                                    value={searchInputValue}
                                    onChange={(e) => setSearchInputValue(e.target.value)}
                                    onKeyDown={(e) => { if(e.key === 'Enter') triggerSearchQueryExecution(); }}
                                    className="w-full bg-transparent px-4 py-2 text-xs md:text-sm text-ytBlack focus:outline-none placeholder-gray-400 font-medium"
                                />
                                <button 
                                    onClick={triggerSearchQueryExecution}
                                    className="bg-ytLightGray border-l border-ytBorder px-4 md:px-6 py-2 flex items-center text-gray-600 hover:bg-ytHoverGray active:bg-gray-200 transition"
                                    aria-label="Execute Visual Query Database Match"
                                >
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                </button>
                            </div>
                        </div>

                        {/* SIGN IN / USER ACTION CONTROLS INTERACTIVE PORTAL LAYOUT */}
                        <div className="flex items-center space-x-3">
                            <button 
                                onClick={() => { if(user) { setCurrentTab('upload'); setActivePreview(null); } else { setAuthModalOpen(true); } }}
                                className="hidden md:flex items-center space-x-1.5 px-4 py-2 bg-pintRed text-ytWhite hover:bg-red-700 text-xs font-bold rounded-full transition shadow-sm uppercase tracking-wider"
                            >
                                <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>
                                <span>Create</span>
                            </button>

                            <div className="relative" ref={profileRef}>
                                {user ? (
                                    <button 
                                        onClick={() => setProfileDropdownOpen(!profileDropdownOpen)}
                                        className="w-9 h-9 rounded-full bg-ytBlack text-ytWhite flex items-center justify-center font-black text-xs shadow hover:scale-105 active:scale-95 transition uppercase tracking-tighter"
                                    >
                                        {user.email.substring(0, 2)}
                                    </button>
                                ) : (
                                    <button 
                                        onClick={() => setAuthModalOpen(true)}
                                        className="flex items-center space-x-1 px-3 py-2 border-2 border-ytBlack text-ytBlack text-xs font-black rounded-full hover:bg-ytLightGray transition uppercase tracking-wider"
                                    >
                                        <span>Join Session</span>
                                    </button>
                                )}

                                {/* AUTH PROFILE INTERACTIVE USER DECK ACCORDION MENU */}
                                {profileDropdownOpen && user && (

                                    <p className="text-gray-600 text-xs mb-4">Our platform operates under strict minimal data collection parameters. When providing an identity profile authentication string mapping (email address token), values are stored securely to validate your user library collections and content ownership properties.</p>
                                    <h3 className="text-xs font-black uppercase tracking-widest text-ytBlack mt-4 mb-2">2. Visual Asset Synchronization Parameters</h3>
                                    <p className="text-gray-600 text-xs mb-4">Any graphical target configuration URL location address text string submitted by platform members is indexed into a public community streaming table database. It is mapped alongside anonymized access metrics to ensure fair distribution and load balancing tracking analysis.</p>
                                </div>
                            )}

                            {/* ROUTE DISPLAY METRICS MODULE F: EXTENSIVE LEGAL CONDITIONS COMPLIANCE FRAME (TERMS) */}
                            {currentTab === 'terms' && (
                                <div className="max-w-3xl mx-auto py-6 font-sans leading-relaxed">
                                    <h1 className="text-3xl font-black uppercase tracking-tight mb-4 border-b border-ytBorder pb-2">Terms of Service Agreement</h1>
                                    <p className="text-gray-700 text-xs mb-4 font-semibold">By initializing interaction processes with this web interface architecture, you agree to comply with all structural operational guidelines outlined herein.</p>
                                    <h3 className="text-xs font-black uppercase tracking-widest text-ytBlack mt-4 mb-2">1. Permitted Resource Infrastructure Use</h3>
                                    <p className="text-gray-600 text-xs mb-4">Users must not pass malformed structural query parameter commands into the application runtime or submit visual target reference address strings containing malicious vectors. All graphical assets posted to the system must remain free of intellectual property restrictions or copyright encumbrances.</p>
                                    <h3 className="text-xs font-black uppercase tracking-widest text-ytBlack mt-4 mb-2">2. Liability Limits Matrix</h3>
                                    <p className="text-gray-600 text-xs mb-4">The core system framework operators provide no structural functional accuracy guarantees for third-party hosting links embedded within the platform layout grids. Media download actions occur entirely at the risk of the individual device configuration user node.</p>
                                </div>
                            )}

                            {/* ROUTE DISPLAY METRICS MODULE G: DETAILED STORAGE MATRIX DISCLOSURES (COOKIES) */}
                            {currentTab === 'cookies' && (
                                <div className="max-w-3xl mx-auto py-6 font-sans leading-relaxed">
                                    <h1 className="text-3xl font-black uppercase tracking-tight mb-4 border-b border-ytBorder pb-2">Cookie Tracking Policy Disclosures</h1>
                                    <p className="text-gray-600 text-xs mb-4">Our framework eliminates typical cross-site marketing or tracker components. Instead, we use advanced local structural storage systems (`localStorage`) to preserve performance choices across sessions.</p>
                                    <table className="w-full text-left text-xs border border-ytBorder mt-4 font-mono">
                                        <thead>
                                            <tr className="bg-ytLightGray uppercase border-b border-ytBorder text-[10px] font-black tracking-wider text-ytBlack">
                                                <th className="p-3">Storage Key Registry Node</th>
                                                <th className="p-3">Functional Core Objective Property Mapping</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-ytBorder text-gray-600">
                                            <tr><td className="p-3 font-bold text-ytBlack">`wall_likes`</td><td className="p-3">Tracks user interactions with wallpaper objects to manage favorites.</td></tr>
                                            <tr><td className="p-3 font-bold text-ytBlack">`wall_downloads`</td><td className="p-3">Maintains histories of asset download tasks to optimize user libraries.</td></tr>
                                            <tr><td className="p-3 font-bold text-ytBlack">`wall_community_cache`</td><td className="p-3">Maintains local wallpaper configurations when cloud channels are busy.</td></tr>
                                            <tr><td className="p-3 font-bold text-ytBlack">`sim_session_email`</td><td className="p-3">Saves standard layout registration emails during local test profiles.</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {/* ROUTE DISPLAY METRICS MODULE H: CORE CORPORATE SYSTEM DISCLAIMER NODES */}
                            {currentTab === 'disclaimer' && (
                                <div className="max-w-3xl mx-auto py-6 font-sans leading-relaxed">
                                    <h1 className="text-3xl font-black uppercase tracking-tight mb-4 border-b border-ytBorder pb-2">Legal Disclaimer Notice</h1>
                                    <div className="bg-ytLightGray/50 border-l-4 border-pintRed p-4 rounded-xl text-xs text-gray-700 font-medium mb-4 uppercase tracking-wide">
                                        Attention: This framework runs as an open platform for media indexing. The operations management network has no direct control over independent image hosting servers.
                                    </div>
                                    <p className="text-gray-600 text-xs mb-4">All trademarks, graphic properties, and high-definition visual assets showcased within the platform layout configuration modules are the intellectual property of their respective creators and owners.</p>
                                    <p className="text-gray-600 text-xs mb-4">If an asset link index points to an object that violates structural guidelines or properties, copyright owners can file an optimization request to remove the entry from our public indexing system immediately.</p>
                                </div>
                            )}

                        </main>
                    </div>

                    {/* =========================================================================
                        IDENTITY SECURITY AUTHENTICATION MODAL OVERLAY
                        ========================================================================= */}
                    {authModalOpen && (
                        <div className="fixed inset-0 bg-ytBlack/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 font-sans select-none animate-fadeIn">
                            <div className="bg-ytWhite border border-ytBorder rounded-3xl w-full max-w-sm p-6 shadow-2xl relative">
                                <button onClick={() => setAuthModalOpen(false)} className="absolute top-4 right-4 text-gray-400 hover:text-ytBlack transition">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>
                                <h2 className="text-lg font-black uppercase tracking-tight mb-1 text-ytBlack">{authMode === 'login' ? 'Sign In Node' : 'Register Profile'}</h2>
                                <p className="text-[11px] text-gray-400 uppercase tracking-wider mb-4">Unlock advanced image metrics and community asset publishing privileges.</p>
                                
                                <form onSubmit={handleIdentityVerification} className="space-y-3.5">
                                    <input 
                                        type="email" 
                                        required
                                        placeholder="Enter secure profile email address link" 
                                        value={authEmail} 
                                        onChange={(e) => setAuthEmail(e.target.value)} 
                                        className="w-full text-xs font-bold p-3.5 border border-ytBorder rounded-xl bg-ytLightGray/40 text-ytBlack focus:bg-white focus:outline-none focus:border-gray-400" 
                                    />
                                    <input 
                                        type="password" 
                                        required
                                        placeholder="Enter access authentication token" 
                                        value={authPassword} 
                                        onChange={(e) => setAuthPassword(e.target.value)} 
                                        className="w-full text-xs font-bold p-3.5 border border-ytBorder rounded-xl bg-ytLightGray/40 text-ytBlack focus:bg-white focus:outline-none focus:border-gray-400" 
                                    />
                                    <button type="submit" className="w-full py-3.5 bg-ytBlack text-ytWhite font-black text-xs uppercase tracking-widest rounded-xl hover:bg-neutral-800 active:scale-98 transition shadow">Verify Profiling Details</button>
                                </form>
                                
                                <div className="mt-4 pt-4 border-t border-ytBorder text-center">
                                    <button onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className="text-xs font-extrabold text-blue-600 hover:underline transition">
                                        {authMode === 'login' ? "Register a fresh email layout configuration profile" : "Have active session details? Log In here"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // PHYSICAL RENDERING ASSIGNMENT
        const rootElementInstance = ReactDOM.createRoot(document.getElementById('root'));
        rootElementInstance.render(<App />);
    </script>
</body>
</html>
